---
version: "2.0"

services:
  service-1:
    image: ishamishra0408/akash-preflight:v2
    expose:
      - port: 8080
        as: 80
        to:
          - global: true

profiles:
  compute:
    service-1:
      resources:
        cpu:
          units: 4
        memory:
          size: 1Gi
        storage:
          size: 1Gi
  placement:
    dcloud:
      pricing:
        service-1:
          denom: uakt
          amount: 100000

deployment:
  service-1:
    dcloud:
      profile: service-1
      count: 1
